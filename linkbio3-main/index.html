<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Camille 🎀</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Nunito:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --p1: #ff85c8;
            --p2: #ffb3e0;
            --p3: #ffd6ef;
            --p4: #fff0f8;
            --p5: #e8006f;
            --card: rgba(255,255,255,0.62);
            --card-border: rgba(255,180,220,0.55);
            --text: #6b2150;
            --text-soft: #c47baa;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(160deg, #ffe0f3 0%, #ffc8e8 30%, #ffaad8 60%, #ff85c2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 56px 20px 80px;
            font-family: 'Nunito', sans-serif;
            overflow-x: hidden;
            position: relative;
        }

        /* floating hearts deco */
        .deco {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            font-size: 22px;
            opacity: 0.18;
            animation: floatUp linear infinite;
        }
        .deco:nth-child(1) { left: 8%;  bottom: -40px; animation-duration: 9s;  animation-delay: 0s;   font-size: 18px; }
        .deco:nth-child(2) { left: 20%; bottom: -40px; animation-duration: 12s; animation-delay: 2s;   font-size: 14px; }
        .deco:nth-child(3) { left: 75%; bottom: -40px; animation-duration: 10s; animation-delay: 1s;   font-size: 20px; }
        .deco:nth-child(4) { left: 88%; bottom: -40px; animation-duration: 8s;  animation-delay: 4s;   font-size: 12px; }
        .deco:nth-child(5) { left: 50%; bottom: -40px; animation-duration: 14s; animation-delay: 0.5s; font-size: 16px; }
        @keyframes floatUp {
            0%   { transform: translateY(0)   rotate(-10deg); opacity: 0.18; }
            80%  { opacity: 0.18; }
            100% { transform: translateY(-105vh) rotate(15deg); opacity: 0; }
        }

        /* sparkle top */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 20% 15%, rgba(255,255,255,0.55) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(255,200,235,0.4) 0%, transparent 35%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 380px;
        }

        /* ── Avatar ── */
        .avatar-wrap {
            position: relative;
            margin-bottom: 20px;
        }
        .avatar-outer {
            width: 118px; height: 118px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff55a5, #ffb3e0, #ff55a5);
            background-size: 200% 200%;
            animation: gradShift 4s ease infinite;
            padding: 4px;
            box-shadow: 0 0 0 4px rgba(255,255,255,0.6), 0 8px 28px rgba(255,80,160,0.35);
        }
        @keyframes gradShift {
            0%,100% { background-position: 0% 50%; }
            50%      { background-position: 100% 50%; }
        }
        .avatar-inner {
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 4px solid #fff;
            overflow: hidden;
        }
        .avatar-inner img {
            width: 100%; height: 100%;
            object-fit: cover;
        }
        /* crown deco */
        .avatar-crown {
            position: absolute;
            top: -14px; left: 50%;
            transform: translateX(-50%);
            font-size: 26px;
            filter: drop-shadow(0 2px 4px rgba(255,100,170,0.4));
            animation: wobble 3s ease-in-out infinite;
        }
        @keyframes wobble {
            0%,100% { transform: translateX(-50%) rotate(-6deg); }
            50%      { transform: translateX(-50%) rotate(6deg); }
        }
        .status-dot {
            position: absolute;
            bottom: 7px; right: 7px;
            width: 15px; height: 15px;
            border-radius: 50%;
            background: #4cd97b;
            border: 3px solid #fff;
            box-shadow: 0 0 0 2px rgba(76,217,123,0.35);
        }

        /* ── Name ── */
        .name {
            font-family: 'Quicksand', sans-serif;
            font-size: 30px;
            font-weight: 700;
            color: var(--p5);
            letter-spacing: 0.3px;
            text-shadow: 0 2px 12px rgba(255,80,160,0.25);
            margin-bottom: 6px;
        }
        .bio {
            font-size: 13px;
            color: var(--text-soft);
            text-align: center;
            margin-bottom: 32px;
            font-weight: 400;
            line-height: 1.6;
        }

        /* ── Badges ── */
        .badges {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 30px;
        }
        .badge {
            font-size: 11.5px;
            font-weight: 600;
            color: var(--p5);
            background: rgba(255,255,255,0.7);
            border: 1px solid var(--card-border);
            border-radius: 999px;
            padding: 4px 12px;
            letter-spacing: 0.3px;
            backdrop-filter: blur(8px);
        }

        /* ── Links ── */
        .links {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 13px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            border-radius: 20px;
            text-decoration: none;
            color: var(--text);
            background: var(--card);
            border: 1.5px solid var(--card-border);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            box-shadow: 0 4px 18px rgba(255,100,170,0.12), 0 1px 0 rgba(255,255,255,0.8) inset;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            position: relative;
            overflow: hidden;
        }
        .link-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, transparent 60%);
            border-radius: 20px;
            pointer-events: none;
        }
        .link-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 32px rgba(255,80,160,0.25), 0 1px 0 rgba(255,255,255,0.8) inset;
            border-color: rgba(255,130,190,0.75);
        }
        .link-btn:active { transform: scale(0.98); }

        .link-icon {
            width: 44px; height: 44px;
            border-radius: 14px;
            background: linear-gradient(135deg, #ffe0f3, #ffb8dc);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(255,100,170,0.2);
        }
        .link-icon img {
            width: 27px; height: 27px;
            object-fit: contain;
            border-radius: 6px;
        }

        .link-text { display: flex; flex-direction: column; }
        .link-label {
            font-family: 'Quicksand', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
        }
        .link-sub {
            font-size: 11.5px;
            color: var(--text-soft);
            margin-top: 1px;
            font-weight: 400;
        }

        .link-arrow {
            margin-left: auto;
            width: 28px; height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffb3e0, #ff80c5);
            display: flex; align-items: center; justify-content: center;
            font-size: 15px;
            color: #fff;
            flex-shrink: 0;
            transition: transform 0.2s ease;
            box-shadow: 0 2px 8px rgba(255,80,160,0.3);
        }
        .link-btn:hover .link-arrow { transform: translateX(3px); }

        /* ── Footer ── */
        .footer {
            margin-top: 40px;
            font-size: 11px;
            color: rgba(180,80,140,0.45);
            letter-spacing: 0.6px;
        }

        @media (max-width: 380px) {
            body { padding: 44px 14px 60px; }
            .name { font-size: 26px; }
            .avatar-outer { width: 96px; height: 96px; }
        }
    </style>
</head>
<body>
    <span class="deco">🌸</span>
    <span class="deco">💗</span>
    <span class="deco">🌸</span>
    <span class="deco">💕</span>
    <span class="deco">✨</span>

    <div class="container">
        <div class="avatar-wrap">
            <span class="avatar-crown">👑</span>
            <div class="avatar-outer">
                <div class="avatar-inner">
                    <img src="img/profile2.gif" alt="Camille" loading="lazy">
                </div>
            </div>
            <span class="status-dot"></span>
        </div>

        <h1 class="name">Camille 🎀</h1>
        <p class="bio">ยินดีต้อนรับค่า ˚ʚ♡ɞ˚<br>come hang out with me ~</p>

        <div class="badges">
            <span class="badge">🎮 minecraft</span>
            <span class="badge">🌸 Addons</span>
            <span class="badge">🎨 Creator</span>
        </div>

        <div class="links">
            <a class="link-btn" href="https://discord.gg/EAJhBngFQc">
                <div class="link-icon">
                    <img src="img/discord.png" alt="">
                </div>
                <div class="link-text">
                    <span class="link-label">Discord</span>
                    <span class="link-sub">เข้ามาคุยกันได้เลย</span>
                </div>
                <span class="link-arrow">›</span>
            </a>

            <a class="link-btn" href="https://t.me/+VPuzxwtZDGg5Y2Vl">
                <div class="link-icon">
                    <img src="img/telegram.gif" alt="">
                </div>
                <div class="link-text">
                    <span class="link-label">Telegram</span>
                    <span class="link-sub">หาแอดออน</span>
                </div>
                <span class="link-arrow">›</span>
            </a>

            <a class="link-btn" href="https://www.roblox.com/share?code=acea0435a76ecb4587f61f0a9b857639&type=Profile&source=ProfileShare">
                <div class="link-icon">
                    <img src="https://devforum-uploads.s3.dualstack.us-east-2.amazonaws.com/uploads/optimized/4X/7/3/e/73e99bc29b53d46c53a257709a18fe63361cce23_2_500x500.png" alt="">
                </div>
                <div class="link-text">
                    <span class="link-label">Roblox</span>
                    <span class="link-sub">หาเพื่อนเล่นเกม</span>
                </div>
                <span class="link-arrow">›</span>
            </a>
        </div>

    
    </div>
</body>
</html>
